<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Financial Advisor</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h1>AI Financial Advisor</h1>

    <form id="financeForm">
        <label>Monthly Income:</label>
        <input type="number" id="income" required>

        <label>Rent:</label>
        <input type="number" id="rent" required>

        <label>Food:</label>
        <input type="number" id="food" required>

        <label>Transportation:</label>
        <input type="number" id="transport" required>

        <label>Entertainment:</label>
        <input type="number" id="entertainment" required>

        <label>Other Expenses:</label>
        <input type="number" id="other" required>

        <label>Savings Goal:</label>
        <input type="number" id="goal" required>

        <button type="submit">Analyze</button>
    </form>

    <div id="results"></div>

    <script src="app.js"></script>
</body>
</html>
